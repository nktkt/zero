version: 2
updates:
  # Root npm workspace (typescript, @types/node, @vercel/sandbox)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # VS Code extension workspace
  - package-ecosystem: npm
    directory: /extensions/vscode
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Docs site (pnpm)
  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions versions (checkout, setup-node, setup-zig, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
